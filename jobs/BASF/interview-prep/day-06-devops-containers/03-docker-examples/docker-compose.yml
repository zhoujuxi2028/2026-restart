#       - docker-compose up -d web-app database redis
#       # Wait for health checks
#       - sleep 10
#       # Run tests
#       - docker-compose run --rm cypress-tests
#       - docker-compose run --rm newman-tests
#     after_script:
#       # Cleanup
#       - docker-compose down -v
#     artifacts:
#       when: always
#       paths:
#         - test-results/
#
# GitHub Actions Example:
#   - name: Start services
#     run: docker-compose up -d web-app database redis
#
#   - name: Wait for services
#     run: sleep 10
#
#   - name: Run Cypress tests
#     run: docker-compose run --rm cypress-tests
#
#   - name: Run Newman tests
#     run: docker-compose run --rm newman-tests
#
#   - name: Cleanup
#     if: always()
#     run: docker-compose down -v
#
#   - name: Upload test results
#     if: always()
#     uses: actions/upload-artifact@v3
#     with:
#       name: test-results
#       path: test-results/
#
# ============================================
# Troubleshooting
# ============================================
#
# Issue: Services not ready when tests start
# Solution: Increase sleep time in test command or use wait-on
#
# Issue: Port already in use
# Solution: Change port mapping (e.g., "3001:3000")
#
# Issue: Tests can't connect to services
# Solution: Verify all services are on same network (test-network)
#
# Issue: Permission errors with volumes
# Solution: Ensure directories exist and have proper permissions:
#   mkdir -p test-results/cypress/{videos,screenshots,results}
#   mkdir -p test-results/newman
#   chmod -R 777 test-results/
#
# Issue: Slow startup on first run
# Solution: Normal - Docker pulls images. Subsequent runs are faster.
#
# ============================================
# Interview Talking Points
# ============================================
# - "Docker Compose provides a complete test environment in one command"
# - "Health checks ensure tests don't start until services are ready"
# - "Same compose file works on all developer machines and in CI"
# - "Easy to add new services (ElasticSearch, message queue, etc.)"
# - "Volume mounts make test results accessible for CI artifacts"
# - "Can run multiple test suites (Cypress + Newman) in one workflow"
# - "Isolated network prevents interference from other Docker containers"
